<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1000" preserveAspectRatio="none">
  <!-- Cesped con franjas -->
  <rect width="700" height="1000" fill="#2e7d32"/>
  <g fill="#2f8235">
    <rect y="0"   width="700" height="100"/>
    <rect y="200" width="700" height="100"/>
    <rect y="400" width="700" height="100"/>
    <rect y="600" width="700" height="100"/>
    <rect y="800" width="700" height="100"/>
  </g>

  <!-- Lineas -->
  <g fill="none" stroke="#ffffff" stroke-width="4" opacity="0.9">
    <!-- Limite exterior -->
    <rect x="30" y="30" width="640" height="940"/>

    <!-- Linea de mitad de cancha -->
    <line x1="30" y1="500" x2="670" y2="500"/>
    <!-- Circulo central -->
    <circle cx="350" cy="500" r="90"/>
    <circle cx="350" cy="500" r="4" fill="#ffffff"/>

    <!-- Area grande arriba -->
    <rect x="180" y="30" width="340" height="150"/>
    <!-- Area chica arriba -->
    <rect x="265" y="30" width="170" height="60"/>
    <!-- Punto penal arriba -->
    <circle cx="350" cy="140" r="4" fill="#ffffff"/>
    <!-- Semicirculo arriba -->
    <path d="M 270 180 A 90 90 0 0 0 430 180"/>

    <!-- Area grande abajo -->
    <rect x="180" y="820" width="340" height="150"/>
    <!-- Area chica abajo -->
    <rect x="265" y="910" width="170" height="60"/>
    <!-- Punto penal abajo -->
    <circle cx="350" cy="860" r="4" fill="#ffffff"/>
    <!-- Semicirculo abajo -->
    <path d="M 270 820 A 90 90 0 0 1 430 820"/>
  </g>
</svg>
